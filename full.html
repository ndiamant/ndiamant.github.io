<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script src="d3/d3.js"></script>
    <script src="animation-utils.js"></script>
  </head>
  <body>
    <script>
      var h = window.innerHeight - 40;
      var w = window.innerWidth - 40;
      var r = 15;
      var n = 500;

      var svg = d3
        .select("body")
        .append("svg")
        .attr("height", h)
        .attr("width", w);

      var nextX = makeWalker(20, r, w);
      var nextY = makeWalker(20, r, h);
      var data = makeColorData(n);

      svg
        .selectAll("rect")
        .data(data)
        .enter()
        .append("rect")
        .attr("width", r)
        .attr("height", r)
        .attr("x", 20)
        .attr("y", 20)
        .attr("fill", function (d) {
          return d[1];
        })
        .transition()
        .delay(function (d) {
          return d[0];
        })
        .duration(1000)
        .on("start", function repeat() {
          d3.active(this)
            .attr("y", nextY())
            .transition()
            .attr("x", nextX())
            .transition()
            .on("start", repeat);
        });
    </script>
  </body>
</html>
